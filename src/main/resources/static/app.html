<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="theme-color" content="#1a237e">
   <title>PUCMM — Encuestas</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
   <link rel="stylesheet" href="/styles.css">
   </style>
</head>

<body>
   <!-- Contenido -->
   <div class="container-fluid mt-5 pt-3 pb-5">

      <div id="alertGlobal" class="alert d-none mt-2 mx-2" role="alert"></div>

      <!-- Tabs de navegación -->
      <ul class="nav nav-tabs nav-fill mt-2 px-2" id="mainTabs">
         <li class="nav-item">
            <button class="nav-link active" onclick="mostrarSeccion('nueva')">
               <i class="bi bi-plus-circle"></i> Nueva
            </button>
         </li>
         <li class="nav-item">
            <button class="nav-link" onclick="mostrarSeccion('pendientes')">
               <i class="bi bi-clock-history"></i> Locales
            </button>
         </li>
         <li class="nav-item">
            <button class="nav-link" onclick="mostrarSeccion('servidor')">
               <i class="bi bi-cloud"></i> Servidor
            </button>
         </li>
         <li class="nav-item">
            <button class="nav-link" onclick="mostrarSeccion('mapa')">
               <i class="bi bi-geo-alt"></i> Mapa
            </button>
         </li>
      </ul>

      <!-- ── NUEVA ENCUESTA ── -->
      <div id="secNueva" class="seccion p-3">
         <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
               <h6 class="mb-0"><i class="bi bi-pencil-square"></i> Registrar Nueva Encuesta</h6>
            </div>
            <div class="card-body">
               <div id="geoInfo" class="alert alert-info small py-2 mb-3">
                  <i class="bi bi-geo-alt-fill"></i>
                  <span id="geoTexto">Obteniendo ubicación...</span>
               </div>

               <div class="mb-3">
                  <label class="form-label fw-semibold">Nombre del Encuestado <span class="text-danger">*</span></label>
                  <input type="text" id="fNombre" class="form-control form-control-lg" placeholder="Nombre completo">
               </div>
               <div class="mb-3">
                  <label class="form-label fw-semibold">Sector <span class="text-danger">*</span></label>
                  <input type="text" id="fSector" class="form-control"
                     placeholder="Ej: Los Jardines, Centro, Villa Olga...">
               </div>
               <div class="mb-3">
                  <label class="form-label fw-semibold">Nivel Escolar <span class="text-danger">*</span></label>
                  <select id="fNivelEscolar" class="form-select form-select-lg">
                     <option value="">-- Selecciona --</option>
                     <option value="Básico">Básico</option>
                     <option value="Medio">Medio</option>
                     <option value="Grado Universitario">Grado Universitario</option>
                     <option value="Postgrado">Postgrado</option>
                     <option value="Doctorado">Doctorado</option>
                  </select>
               </div>

               <!-- Cámara -->


               <div class="d-grid">
                  <button onclick="guardarEncuesta()" class="btn btn-primary btn-lg fw-bold">
                     Guardar Encuesta
                  </button>
               </div>
            </div>
         </div>
      </div>






   </div>


   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script>
      function logout() {
         ['survey_token', 'survey_username', 'survey_nombre', 'survey_rol']
            .forEach(k => localStorage.removeItem(k));
         window.location.replace('/login.html');
      }
   </script>

</body>

</html>
