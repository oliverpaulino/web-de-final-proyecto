<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a237e">
    <title>PUCMM — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="vh-100 d-flex align-items-center justify-content-center login-bg">
    <div class="card shadow-lg login-card">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <div class="logo-circle mx-auto mb-3">
                    <i class="bi bi-clipboard2-pulse-fill fs-1 text-white"></i>
                </div>
                <h4 class="fw-bold text-primary">Sistema de Encuestas</h4>
                <p class="text-muted small mb-0">PUCMM — Oficina de Planeamiento</p>
            </div>

            <div id="alertLogin" class="alert d-none mb-3" role="alert"></div>

            <!-- Tabs -->
            <ul class="nav nav-pills nav-fill mb-3" id="authTabs">
                <li class="nav-item">
                    <button class="nav-link active" onclick="mostrarTab('login')">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="mostrarTab('registro')">
                        <i class="bi bi-person-plus"></i> Registrarse
                    </button>
                </li>
            </ul>

            <!-- ── LOGIN ── -->
            <div id="formLogin">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="loginUsername" class="form-control"
                               placeholder="Tu usuario" autocomplete="username">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="loginPassword" class="form-control"
                               placeholder="••••••" autocomplete="current-password">
                    </div>
                </div>
                <button onclick="hacerLogin()" class="btn btn-primary w-100 fw-bold">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </button>
                <div id="offlineInfo" class="alert alert-warning mt-2 d-none small">
                    <i class="bi bi-wifi-off"></i> Sin conexión — usando sesión guardada
                </div>
            </div>

            <!-- ── REGISTRO ── -->
            <div id="formRegistro" class="d-none">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre Completo</label>
                    <input type="text" id="regNombre" class="form-control" placeholder="Tu nombre completo">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <input type="text" id="regUsername" class="form-control" placeholder="Nombre de usuario">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Mín. 6 caracteres">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Rol</label>
                    <select id="regRol" class="form-select">
                        <option value="encuestador">Encuestador</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button onclick="hacerRegistro()" class="btn btn-success w-100 fw-bold">
                    <i class="bi bi-person-check"></i> Crear Cuenta
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
