<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a237e">
    <title>PUCMM — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #e8efff;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('./img/foto-fundadora.jpeg');
            background-repeat: repeat;
            background-size: 220px auto;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }

        .bg-repeat {
            position: relative;
        }

        .login-bg {
            min-height: 100vh;
            position: relative;
        }

        .login-card {
            width: min(100%, 460px);
            border: 1px solid rgba(26, 35, 126, 0.08);
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 80px rgba(26, 35, 126, 0.16);
        }

        .logo-circle {
            width: clamp(88px, 22vw, 128px);
            aspect-ratio: 1;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 12px 28px rgba(26, 35, 126, 0.18);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 576px) {
            .login-bg {
                align-items: flex-start !important;
            }

            .login-card {
                border-radius: 1.25rem;
            }
        }
    </style>
</head>

<body class="bg-repeat">

    <div class="login-bg d-flex align-items-center justify-content-center px-3 py-4">
        <div class="card login-card">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <div class="logo-circle mx-auto mb-3">
                        <img src="./img/foto-fundadora.jpeg" alt="Foto de la fundadora">
                    </div>
                    <h4 class="fw-bold text-primary">Sistema de Encuestas</h4>
                    <p class="text-muted small mb-0">PUCMM — Oficina de Planeamiento</p>
                </div>

                <div id="alertLogin" class="alert d-none mb-3" role="alert"></div>

                <!-- Tabs -->
                <ul class="nav nav-pills nav-fill mb-3" id="authTabs">
                    <li class="nav-item">
                        <button class="nav-link active" onclick="mostrarTab('login')">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" onclick="mostrarTab('registro')">
                            <i class="bi bi-person-plus"></i> Registrarse
                        </button>
                    </li>
                </ul>

                <!-- ── LOGIN ── -->
                <div id="formLogin">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="loginUsername" class="form-control" placeholder="Tu usuario"
                                autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="loginPassword" class="form-control" placeholder="••••••"
                                autocomplete="current-password">
                        </div>
                    </div>
                    <button onclick="hacerLogin()" class="btn btn-primary w-100 fw-bold">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                    </button>
                    <div id="offlineInfo" class="alert alert-warning mt-2 d-none small">
                        <i class="bi bi-wifi-off"></i> Sin conexión — usando sesión guardada
                    </div>
                </div>

                <!-- ── REGISTRO ── -->
                <div id="formRegistro" class="d-none">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <input type="text" id="regNombre" class="form-control" placeholder="Tu nombre completo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <input type="text" id="regUsername" class="form-control" placeholder="Nombre de usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="Mín. 6 caracteres">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rol</label>
                        <select id="regRol" class="form-select">
                            <option value="encuestador">Encuestador</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <button onclick="hacerRegistro()" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-person-check"></i> Crear Cuenta
                    </button>
                </div>

            </div>
        </div>
    </div>
    <script>

        // Si ya tiene sesión guardada, ir directo al app
        // (function () {
        //     if (localStorage.getItem('survey_token')) {
        //         window.location.href = '/app.html';
        //     }
        // })();
        function alerta(msg, tipo) {
            const el = document.getElementById('alertLogin');
            el.className = `alert alert-${tipo}`;
            el.textContent = msg;
            el.classList.remove('d-none');
        }

        function mostrarTab(tab) {
            document.getElementById('formLogin').classList.toggle('d-none', tab !== 'login');
            document.getElementById('formRegistro').classList.toggle('d-none', tab !== 'registro');
            document.querySelectorAll('#authTabs .nav-link').forEach((btn, i) => {
                btn.classList.toggle('active',
                    (i === 0 && tab === 'login') || (i === 1 && tab === 'registro'));
            });
        }

        async function hacerLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { alerta('Completa todos los campos', 'warning'); return; }

            if (!navigator.onLine) {
                // Login offline con sesión guardada
                const u = localStorage.getItem('survey_username');
                if (localStorage.getItem('survey_token') && u === username) {
                    document.getElementById('offlineInfo').classList.remove('d-none');
                    setTimeout(() => window.location.href = '/app.html', 800);
                } else {
                    alerta('Sin conexión y no hay sesión guardada para este usuario', 'danger');
                }
                return;
            }
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { alerta(data.error || 'Credenciales incorrectas', 'danger'); return; }

                localStorage.setItem('survey_token', data.token);
                localStorage.setItem('survey_username', data.username);
                localStorage.setItem('survey_nombre', data.nombre);
                localStorage.setItem('survey_rol', data.rol);

                window.location.href = '/app.html';
            } catch (e) {
                alerta('Error de conexión: ' + e.message, 'danger');
            }
        }


        // Enter en password hace login
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') hacerLogin();
        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
