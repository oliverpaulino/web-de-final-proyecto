version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: survey-app
    environment:
      - MONGO_URI=mongodb://mongo:27017/surveydb
    ports:
      - "7770:7770"   # HTTP / Javalin
      - "9090:9090"   # gRPC
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - survey-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7770/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    container_name: survey-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - survey-net

  nginx:
    image: nginx:alpine
    container_name: survey-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - survey-net

volumes:
  mongo_data:

networks:
  survey-net:
    driver: bridge